<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Nagi_san096</title>
    <style>

        :root {
            --main-color: #4e342e;
            --sub-color: #795548;
            --bg: #ffffff;
            --line-light: #eeeeee;
            --line-dark: #333333;
        }

        body {
            font-family: sans-serif;
            color: #333;
            margin: 0;
            padding: 40px 20px;
            line-height: 1.6;
            background-color: var(--bg);
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        header {
            border-bottom: 2px solid var(--main-color);
            padding-bottom: 10px;
            margin-bottom: 0;
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            color: var(--main-color);
            letter-spacing: 0.1em;
            font-weight: bold;
        }

        nav {
            margin-bottom: 40px;
            border-bottom: 1px solid var(--line-light);
        }

        .nav-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            gap: 20px;
        }

        .nav-list li a {
            display: inline-block;
            padding: 10px 0;
            text-decoration: none;
            color: var(--sub-color);
            font-size: 0.85rem;
            font-weight: bold;
        }

        .nav-list li a:hover {
            color: var(--main-color);
            border-bottom: 2px solid var(--main-color);
        }

        section {
            margin-bottom: 40px;
            border: var(--line-light) solid 1px;
            padding: 10px;
            padding-top: 0;
        }

        h2 {
            font-size: 0.9rem;
            color: var(--sub-color);
            margin-bottom: 15px;
            letter-spacing: 0.1em;
            font-weight: bold;
        }

        .hobby-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        .hobby-table th, .hobby-table td {
            border: 1px solid var(--line-dark);
            padding: 12px;
            text-align: left;
        }

        .hobby-table th {
            background-color: #fcfcfc;
            width: 30%;
            color: var(--sub-color);
            font-weight: bold;
        }

        .intro-text {
            font-size: 0.95rem;
            margin: 0;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            border: 1px solid var(--line-dark);
            color: var(--line-dark);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn:hover {
            background: var(--line-dark);
            color: white;
        }

        .post-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .post-item {
            border: 1px solid var(--line-light);
            padding: 20px;
            text-decoration: none;
            color: inherit;
            transition: 0.2s;
            display: block;
        }

        .post-item:hover {
            border: 1px solid var(--line-dark);
            background-color: #fcfcfc;
        }

        .post-date {
            font-size: 0.75rem;
            color: var(--sub-color);
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .post-title {
            margin: 0 0 10px 0;
            font-size: 1.1rem;
            color: var(--main-color);
            font-weight: bold;
        }

        .post-excerpt {
            font-size: 0.85rem;
            color: #666;
            margin: 0;
        }

        .back-link {
            display: inline-block;
            margin-top: 40px;
            font-size: 0.85rem;
            color: var(--sub-color);
            text-decoration: none;
            font-weight: bold;
        }

        footer {
            margin-top: 60px;
            font-size: 0.7rem;
            color: #bbb;
            text-align: left;
        }

        .small {
            font-size: 0.76rem;
            color: #8e8e8e;
            text-align: left;
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }

        .photo-item {
            border: 1px solid var(--line-light);
            padding: 8px;
            background: #ffffff;
            transition: 0.2s;
        }

        .photo-item:hover {
            border-color: var(--line-dark); 
        }

        .photo-item img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
            aspect-ratio: 3 / 2;
        }

        .photo-caption {
            font-size: 0.7rem;
            color: var(--sub-color);
            margin-top: 10px;
            font-weight: bold;
            line-height: 1.2;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Nagisan's Blog</h1>
    </header>

    <nav>
        <ul class="nav-list">
            <li><a href="./index.html">HOME</a></li>
            <li><a href="./blog.html">BLOG</a></li>
        </ul>
    </nav>

    <main>
        <section>
            <h2>GALLERY</h2>
            <div class="photo-grid">

                <div class="photo-item">
                    <img src="img/IMG_1538.JPG" alt="作品4">
                    <div class="photo-caption">2026.02.08 / 秩父鉄道荒川橋梁</div>
                </div>

                <div class="photo-item">
                    <img src="img/IMG_1329.JPG" alt="作品4">
                    <div class="photo-caption">2026.01.04 / 甲府盆地と富士山</div>
                </div>

                <div class="photo-item">
                    <img src="img/IMG_1118.JPG" alt="作品4">
                    <div class="photo-caption">2025.11.07 / 多摩湖の取水塔</div>
                </div>

                <div class="photo-item">
                    <img src="img/IMG_0474.JPG" alt="作品4">
                    <div class="photo-caption">2025.10.05 / 湊川橋梁の夕焼け</div>
                </div>

                <div class="photo-item">
                    <img src="img/IMG_9820.JPG">
                    <div class="photo-caption">2025.09.14 / 六郷橋と京急線</div>
                </div>
                
                <div class="photo-item">
                    <img src="img/IMG_9000.JPG">
                    <div class="photo-caption">2025.07.06 / 根府川駅とE231系</div>
                </div>

            </div>
        </section>

        <a href="./index.html" class="back-link">← TOPに戻る</a>
    </main>

    <footer>
        <p>&copy; 2026 Nagi_san096</p>
        <p>Template by Msite1</p>
        <p>最終更新：2026.03.19</p>
    </footer>
</div>

</body>
</html>
